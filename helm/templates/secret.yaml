{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ic-gateway.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ic-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  gateway-master-key: {{ required "secret.gatewayMasterKey is required (openssl rand -base64 32)" .Values.secret.gatewayMasterKey | quote }}
  litellm-master-key: {{ required "secret.litellmMasterKey is required" .Values.secret.litellmMasterKey | quote }}
  {{- with .Values.secret.openRouterApiKey }}
  openrouter-api-key: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.azureFoundryKey }}
  azure-foundry-key: {{ . | quote }}
  {{- end }}
{{- end }}
