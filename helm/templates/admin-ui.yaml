apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ic-gateway.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ic-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.adminUi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: admin-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: admin-ui
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: admin-ui
          image: "{{ .Values.image.registry }}/ic-gateway-admin-ui:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # nginx-unprivileged base runs as uid 101 on a high port. No
          # readOnlyRootFilesystem: nginx needs writable /tmp + /var/cache.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
          resources: {{- toYaml .Values.adminUi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ic-gateway.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ic-gateway.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: admin-ui
  ports:
    - port: 3000
      targetPort: 3000
