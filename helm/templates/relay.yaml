apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ic-gateway.fullname" . }}-relay
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ic-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.relay.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: relay
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: relay
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: relay
          image: "{{ .Values.image.registry }}/ic-gateway-relay:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Relay image is distroless-nonroot, writes nothing to disk, and
          # listens on a high port — so this hardened context is safe.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8081
          env:
            - name: RELAY_BIND_ADDR
              value: "0.0.0.0:8081"
            - name: GATEWAY_ORG_ID
              value: {{ required "orgId is required" .Values.orgId | quote }}
            - name: JWKS_URL
              value: {{ .Values.jwksUrl | quote }}
            - name: DATABASE_URL
              value: {{ include "ic-gateway.databaseUrl" . | quote }}
            {{- if .Values.externalRedis.url }}
            - name: REDIS_URL
              value: {{ .Values.externalRedis.url | quote }}
            {{- end }}
            - name: RUST_LOG
              value: ic_gateway_relay=info,tower_http=info
            - name: GATEWAY_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ic-gateway.secretName" . }}
                  key: gateway-master-key
          resources: {{- toYaml .Values.relay.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ic-gateway.fullname" . }}-relay
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ic-gateway.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: relay
  ports:
    - port: 8081
      targetPort: 8081
