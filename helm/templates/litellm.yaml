apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ic-gateway.fullname" . }}-litellm
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ic-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.litellm.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: litellm
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: litellm
          image: "{{ .Values.image.registry }}/ic-gateway-litellm:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 4000
          env:
            - name: GATEWAY_ORG_ID
              value: {{ required "orgId is required" .Values.orgId | quote }}
            - name: JWKS_URL
              value: {{ .Values.jwksUrl | quote }}
            - name: DATABASE_URL
              value: {{ include "ic-gateway.databaseUrl" . | quote }}
            {{- if .Values.externalRedis.url }}
            - name: REDIS_URL
              value: {{ .Values.externalRedis.url | quote }}
            {{- end }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ic-gateway.secretName" . }}
                  key: litellm-master-key
            {{- if .Values.secret.openRouterApiKey }}
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ic-gateway.secretName" . }}
                  key: openrouter-api-key
            {{- end }}
            {{- if .Values.azureFoundry.url }}
            - name: AZURE_FOUNDRY_URL
              value: {{ .Values.azureFoundry.url | quote }}
            {{- end }}
            {{- if .Values.secret.azureFoundryKey }}
            - name: AZURE_FOUNDRY_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ic-gateway.secretName" . }}
                  key: azure-foundry-key
            {{- end }}
          resources: {{- toYaml .Values.litellm.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ic-gateway.fullname" . }}-litellm
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ic-gateway.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: litellm
  ports:
    - port: 4000
      targetPort: 4000
